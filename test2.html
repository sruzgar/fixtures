<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>National Football Team Fixtures</title>
<link rel="icon" href="https://fixtures.eh30.net/favicon.ico">
<style>
:root {
  --bg: #f6f8fc;
  --card: #ffffff;
  --text: #10233f;
  --muted: #5f6b7a;
  --border: #d8e0ea;
  --accent-2: #e8f2fb;
  --shadow: 0 10px 30px rgba(16, 35, 63, 0.08);
}
* { box-sizing: border-box; }
body {
  margin:0;
  font-family: -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  color: var(--text);
  background-image: url('media/IMG_7632.png');
  background-position: center;
  background-size: cover;
  background-repeat: no-repeat;
}
/* Optional: overlay for readability */
body::before {
  content:"";
  position:fixed;
  top:0; left:0;
  width:100%; height:100%;
  background: rgba(255,255,255,0.4); /* adjust opacity for contrast */
  z-index:-1;
}

.wrap {
  min-height:100vh;
  display:grid;
  place-items:center;
  padding:24px;
}
.card {
  width:min(720px,100%);
  background: var(--card);
  border:1px solid var(--border);
  border-radius:24px;
  box-shadow: var(--shadow);
  padding:28px 20px 28px 20px;
}
.eyebrow {
  width:100%;
  text-align:center;
  padding:12px 0;
  border-radius:24px 24px 0 0;
  color:#fff;
  font-weight:700;
  font-size:16px;
  margin-bottom:16px;
}
h1 { margin:0 0 16px; font-size:clamp(18px,4vw,28px); line-height:1.1; }
.team-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding:8px 0;
  border-bottom: 1px solid #e0e4eb;
}
.team-row:last-child { border-bottom: none; }
.team-name { font-weight:600; display:flex; align-items:center; gap:6px; }
.actions { display:flex; gap:10px; flex-wrap:wrap; }
.btn {
  display:flex;
  align-items:center;
  justify-content:center;
  padding:6px 10px;
  border-radius:12px;
  border:1px solid var(--border);
  background:#fff;
  text-decoration:none;
  color: var(--text);
  gap:6px;
  transition: transform 0.15s, box-shadow 0.15s, border-color 0.15s;
  font-size:13px;
}
.btn img { width:24px; height:24px; }
.btn:hover { transform: translateY(-2px); box-shadow:0 6px 16px rgba(16,35,63,0.08); border-color:#b8c7d9; }
.btn:active { transform: scale(0.97); box-shadow:0 4px 12px rgba(16,35,63,0.12); background: var(--accent-2); }
.hint.blue{
  margin-top:16px;
  padding:12px 14px;
  border-left:4px solid #0c1a31;
  background:#F5F5F5;
  border-radius:12px;
  font-size:13px;
  color:var(--text);
  word-break:break-word;
}
.download-link{
  color:var(--text);
  font-weight:600;
  text-decoration:none;
  border-bottom:2px solid rgba(16,35,63,0.2);
  padding-bottom:2px;
}
.download-link:active{opacity:0.7;}
</style>
</head>
<body>
<main class="wrap">
  <section class="card">
    <div class="eyebrow" style="background:#0c1a31">📅 National Football Team Fixtures</div>
    <h1>Subscribe to fixtures & results</h1>
    <div id="team-list"></div>
    <div class="hint blue">
      If your calendar app does not open directly, download the calendar file directly from the links above.
    </div>
  </section>
</main>

<script>
// Inline team data
const teams = [
  { "name":"Scotland","short":"scotland","calendar":"calendars/scotland.ics","color":"#0c1a31","emoji":"🏴󠁧󠁢󠁳󠁣󠁴󠁿" },
  { "name":"England","short":"england","calendar":"calendars/england.ics","color":"#d40000","emoji":"🏴󠁧󠁢󠁥󠁮󠁧󠁿" }
  // Add more teams here
];

const teamList = document.getElementById('team-list');

teams.forEach(team => {
  const row = document.createElement('div');
  row.className = 'team-row';
  row.innerHTML = `
    <div class="team-name">${team.emoji}</div>
    <div class="actions">
      <a class="btn" style="border-color:${team.color}" href="webcal://${team.calendar}">
        <img src="https://fixtures.eh30.net/media/apple.png" alt="Apple Calendar">Apple
      </a>
      <a class="btn" style="border-color:${team.color}" href="https://www.google.com/calendar/render?cid=webcal://${team.calendar}" target="_blank" rel="noopener noreferrer">
        <img src="https://fixtures.eh30.net/media/google.png" alt="Google Calendar">Google
      </a>
      <a class="btn" style="border-color:${team.color}" href="https://outlook.office.com/owa/?rru=addsubscription&name=${encodeURIComponent(team.name+' National Team')}&url=https://${team.calendar}" target="_blank" rel="noopener noreferrer">
        <img src="https://fixtures.eh30.net/media/outlook.png" alt="Outlook Calendar">Outlook
      </a>
    </div>
  `;
  teamList.appendChild(row);
});

// iOS Webcal fix
document.querySelectorAll('.btn').forEach(link=>{
  link.addEventListener('click', function(e){
    const isIOS = /iPhone|iPad|iPod/i.test(navigator.userAgent) || (navigator.platform==='MacIntel' && navigator.maxTouchPoints>1);
    if(isIOS && this.href.startsWith('webcal://')){
      e.preventDefault();
      window.location.href=this.href;
      setTimeout(()=>{window.location.href=this.href.replace('webcal://','https://');},1500);
    }
  });
});
</script>
</body>
</html>
