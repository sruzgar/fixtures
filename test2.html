<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>National Football Team Fixtures</title>
<link rel="icon" href="https://fixtures.eh30.net/favicon.ico">
<style>
:root {
  --bg: #f6f8fc;
  --card: #ffffff;
  --text: #10233f;
  --muted: #5f6b7a;
  --border: #d8e0ea;
  --accent-2: #e8f2fb;
  --shadow: 0 10px 30px rgba(16, 35, 63, 0.08);
}
* { box-sizing: border-box; }
body {
  margin:0;
  font-family: -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  background: var(--bg);
  color: var(--text);
}
#teams {
  display: grid;
  grid-template-columns: 1fr;
  gap: 24px;
  padding: 24px;
}
@media(min-width:800px){
  #teams { grid-template-columns: repeat(2, minmax(0, 1fr)); }
}
.card {
  background: var(--card);
  border:1px solid var(--border);
  border-radius: 24px;
  box-shadow: var(--shadow);
  position: relative;
  overflow: hidden;
}
.eyebrow {
  position: absolute;
  top:0; left:0;
  width:100%;
  text-align:center;
  padding:12px 0;
  border-radius:24px 24px 0 0;
  color:#fff;
  font-weight:700;
  font-size:16px;
}
.card-content { padding: 48px 20px 28px 20px; }
h1 { margin:0 0 10px; font-size: clamp(18px, 4vw, 28px); line-height:1.1; }
p { margin:0; color: var(--muted); font-size:15px; line-height:1.5; }
.actions {
  display: grid;
  grid-template-columns: 1fr;
  gap: 12px;
  margin-top: 20px;
}
@media(min-width:600px){ .actions { grid-template-columns: repeat(2, 1fr); } }
.btn {
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:8px;
  padding:14px 10px;
  border-radius:18px;
  border:1px solid var(--border);
  text-decoration:none;
  color:var(--text);
  background:#fff;
  min-height:100px;
  transition: transform 0.15s, box-shadow 0.15s, border-color 0.15s;
}
.btn:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(16,35,63,0.08); border-color:#b8c7d9; }
.btn:active { transform: scale(0.97); box-shadow:0 4px 12px rgba(16,35,63,0.12); background: var(--accent-2); }
.btn img { width:36px; height:36px; }
.btn span { font-weight:700; font-size:14px; }
.hint.blue {
  margin-top:14px; padding:12px 14px; border-left:4px solid var(--text); background:#F5F5F5;
  border-radius:12px; color:var(--text); font-size:13px; word-break:break-word;
}
.download-link { color: var(--text); font-weight:600; text-decoration:none; border-bottom:2px solid rgba(16,35,63,0.2); padding-bottom:2px; }
.download-link:active { opacity:0.7; }
</style>
</head>
<body>
<main id="teams"></main>

<script>
// Inline team data
const teams = [
  { "name":"Scotland","short":"scotland","calendar":"calendars/scotland.ics","color":"#0c1a31","emoji":"🏴" },
  { "name":"England","short":"england","calendar":"calendars/england.ics","color":"#d40000","emoji":"🏴" }
  // Add more teams here...
];

const container = document.getElementById('teams');

teams.forEach(team=>{
  const card=document.createElement('section');
  card.className='card';
  card.innerHTML=`
    <div class="eyebrow" style="background:${team.color}">${team.emoji} ${team.name} National Football Team</div>
    <div class="card-content">
      <h1>Subscribe to fixtures & results</h1>
      <p>Sync ${team.name} National Football Team fixtures to your calendar with latest scores, stadium info, and country flag emojis.</p>
      <div class="actions">
        <a class="btn" style="border-color:${team.color}" href="webcal://${team.calendar}">
          <img src="https://fixtures.eh30.net/media/apple.png" alt="Apple Calendar"><span>Apple Calendar</span>
        </a>
        <a class="btn" style="border-color:${team.color}" href="https://www.google.com/calendar/render?cid=webcal://${team.calendar}" target="_blank" rel="noopener noreferrer">
          <img src="https://fixtures.eh30.net/media/google.png" alt="Google Calendar"><span>Google Calendar</span>
        </a>
        <a class="btn" style="border-color:${team.color}" href="https://outlook.office.com/owa/?rru=addsubscription&name=${encodeURIComponent(team.name+' National Team')}&url=https://${team.calendar}" target="_blank" rel="noopener noreferrer">
          <img src="https://fixtures.eh30.net/media/outlook.png" alt="Outlook Calendar"><span>Outlook</span>
        </a>
      </div>
      <div class="hint blue">
        If your calendar app does not open directly, download the calendar file:<br><br>
        <a class="download-link" href="${team.calendar}" target="_blank" rel="noopener noreferrer" download="${team.short}-fixtures.ics">Download ${team.name} fixtures (.ics)</a>
      </div>
    </div>
  `;
  container.appendChild(card);
});

// iOS Webcal fix
document.querySelectorAll('.btn').forEach(link=>{
  link.addEventListener('click',function(e){
    const isIOS=/iPhone|iPad|iPod/i.test(navigator.userAgent)||(navigator.platform==='MacIntel'&&navigator.maxTouchPoints>1);
    if(isIOS && this.href.startsWith('webcal://')){
      e.preventDefault();
      window.location.href=this.href;
      setTimeout(()=>{window.location.href=this.href.replace('webcal://','https://');},1500);
    }
  });
});
</script>
</body>
</html>
