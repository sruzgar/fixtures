<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Page Not Found - Scotland National Team Fixtures</title>
    <meta name="description" content="Page not found. Return to subscribe to Scotland National Team fixtures." />

    <link rel="canonical" href="https://fixtures.eh30.net/" />
    <link rel="icon" href="https://fixtures.eh30.net/favicon.ico" />
    <link rel="preconnect" href="https://fixtures.eh30.net" />
    <link rel="preload" as="image" href="media/grass.jpg" />
    <link rel="preload" as="image" href="media/logo1.jpg" />

    <!-- Privacy-friendly analytics by Plausible -->
    <script async src="https://plausible.io/js/pa-SEp4H-2v-SWMf7pcFZuFY.js"></script>
    <script>
      window.plausible=window.plausible||function(){(plausible.q=plausible.q||[]).push(arguments)},plausible.init=plausible.init||function(i){plausible.o=i||{}};
      plausible.init()
    </script>

  <style>
    :root {
      color-scheme: light;
      --card: rgba(255, 255, 255, 0.9);
      --text: #10233f;
      --muted: #5f6b7a;
      --border: #d8e0ea;
      --accent: #0c1a31;
      --accent-2: #e8f2fb;
      --shadow: 0 10px 30px rgba(16, 35, 63, 0.08);
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      color: var(--text);
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: url('media/grass.jpg') no-repeat center 40%;
      background-size: cover;
      z-index: -1;
    }

    .wrap {
      display: grid;
      place-items: center;
      padding: 24px;
    }

    .eyebrow {
      width: min(720px, 100%);
      text-align: center;
      padding: 16px 0;
      background: var(--accent);
      color: #fff;
      font-weight: 700;
      font-size: 16px;
      border-radius: 24px 24px 0 0;
      margin-bottom: -8px;
      box-shadow: var(--shadow);
      position: relative;
      z-index: 2;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .eyebrow img {
      height: 28px;
      width: auto;
      max-width: 90%;
      display: block;
    }

    .card {
      width: min(720px, 100%);
      border: 1px solid var(--border);
      border-radius: 0 0 24px 24px;
      background: var(--card);
      box-shadow: var(--shadow);
      padding: 40px 28px;
      position: relative;
      z-index: 1;
      text-align: center;
    }

    .error-code {
      font-size: clamp(48px, 12vw, 80px);
      font-weight: 900;
      color: var(--accent);
      margin: 0 0 16px;
      line-height: 1;
    }

    h1 {
      margin: 0 0 12px;
      font-size: clamp(20px, 4vw, 28px);
      line-height: 1.2;
    }

    p {
      margin: 0 0 24px;
      color: var(--muted);
      font-size: 16px;
      line-height: 1.6;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 16px 32px;
      border-radius: 12px;
      border: 2px solid var(--accent);
      text-decoration: none;
      color: #fff;
      background: var(--accent);
      transition: transform 0.15s ease, box-shadow 0.15s ease;
      font-weight: 700;
      font-size: 16px;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }

    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(12, 26, 49, 0.2);
    }

    .btn:active {
      transform: scale(0.97);
    }

    footer {
      width: min(720px, 100%);
      margin-top: 20px;
      padding: 16px 20px 20px;
      text-align: center;
      background: rgba(255, 255, 255, 0.85);
      backdrop-filter: blur(10px);
      border-radius: 16px;
      color: var(--text);
      font-size: 12px;
      line-height: 1.5;
      box-shadow: 0 4px 12px rgba(16, 35, 63, 0.08);
    }

    footer a {
      color: var(--accent);
      text-decoration: none;
      font-weight: 600;
      border-bottom: 1px solid rgba(12, 26, 49, 0.3);
      transition: border-color 0.2s ease;
    }

    footer a:hover {
      border-bottom-color: var(--accent);
    }

    @media (max-width: 768px) {
      .wrap {
        padding: 20px 16px 32px;
      }

      .card {
        border-radius: 0 0 20px 20px;
        padding: 32px 16px;
      }

      .error-code {
        font-size: clamp(40px, 12vw, 64px);
        margin-bottom: 12px;
      }

      h1 {
        margin-bottom: 10px;
      }

      p {
        margin-bottom: 20px;
      }

      .btn {
        padding: 14px 28px;
        font-size: 15px;
      }

      .eyebrow {
        font-size: 14px;
        padding: 14px 0;
      }

      .eyebrow img {
        height: 20px;
      }

      footer {
        margin-top: 16px;
        padding: 14px 16px;
        font-size: 11px;
      }
    }
  </style>
</head>

<body>
  <main class="wrap">
    <div class="eyebrow">
      <img src="media/logo1.jpg" alt="Scotland National Team" />
    </div>

    <section class="card">
      <div class="error-code">404</div>
      <h1>Page Not Found</h1>
      <p>
        This page doesn't exist, but you can still subscribe to Scotland fixtures and never miss a match.
      </p>
      <a class="btn" href="/">Return to Homepage</a>
    </section>

    <footer>
      <a href="https://www.scottishfa.co.uk/scotland-national-team/" target="_blank" rel="noopener">Official Scottish FA</a>
      • <span id="footer-phrase">We'll Be Coming</span>
    </footer>
  </main>

  <script>
    // Track 404 error
    document.addEventListener('DOMContentLoaded', function () {
      plausible('404');
    });

    // Random footer phrase
    function setRandomFooterPhrase() {
      const phrases = [
        "We'll Be Coming",
        "We Roar As One",
        "No Scotland, No Party"
      ];

      const randomPhrase = phrases[Math.floor(Math.random() * phrases.length)];
      const phraseEl = document.getElementById('footer-phrase');

      if (phraseEl) {
        phraseEl.textContent = randomPhrase;
      }
    }

    // Track Scottish FA link
    const sfaLink = document.querySelector('footer a[href*="scottishfa.co.uk"]');
    if (sfaLink) {
      sfaLink.addEventListener('click', function(e) {
        if (window.plausible) {
          plausible('External Link', { props: { link: 'Scottish FA Website' } });
        }
      });
    }

    setRandomFooterPhrase();
  </script>
</body>
</html>
