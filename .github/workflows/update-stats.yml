name: Update Plausible Stats

on:
  schedule:
    # Run every 15 minutes
    - cron: '*/15 * * * *'
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write

jobs:
  update-stats:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Fetch Plausible stats
        env:
          PLAUSIBLE_API_KEY: ${{ secrets.PLAUSIBLE_API_KEY }}
        run: |
          # Fetch stats from Plausible API v2
          # Using the /api/v2/query endpoint
          RESPONSE=$(curl -s -X POST "https://plausible.io/api/v2/query" \
            -H "Authorization: Bearer ${PLAUSIBLE_API_KEY}" \
            -H "Content-Type: application/json" \
            -d '{
              "site_id": "fixtures.eh30.net",
              "metrics": ["visitors", "pageviews"],
              "date_range": "all"
            }')

          echo "API Response: $RESPONSE"

          # Extract visitors and pageviews from v2 API response
          # v2 returns: {"results": [{"metrics": [visitors, pageviews]}]}
          VISITORS=$(echo "$RESPONSE" | grep -o '"visitors":[0-9]*' | grep -o '[0-9]*' | head -1)
          PAGEVIEWS=$(echo "$RESPONSE" | grep -o '"pageviews":[0-9]*' | grep -o '[0-9]*' | head -1)

          # Fallback to 0 if extraction fails
          VISITORS=${VISITORS:-0}
          PAGEVIEWS=${PAGEVIEWS:-0}

          echo "Visitors: $VISITORS"
          echo "Pageviews: $PAGEVIEWS"

          # Get current timestamp
          TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          # Create stats.json
          cat > stats.json << EOF
          {
            "visitors": $VISITORS,
            "pageviews": $PAGEVIEWS,
            "period": "all",
            "updated": "$TIMESTAMP"
          }
          EOF

          cat stats.json

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add stats.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update visitor stats" && git push)
